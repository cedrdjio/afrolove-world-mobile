name: Build Android (store artifacts)

on:
  push:
    branches: ['**']
    paths-ignore: ['**.md']
  workflow_dispatch:

jobs:
  android:
    name: Build APK + AAB
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release App Bundle (Play Store)
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: afrilove-world-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: afrilove-world-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      # Publish a GitHub Release so the APK/AAB have a direct download link
      # (no zip, no login) — handy for installing on a phone.
      - name: Publish to a Release (direct download)
        if: github.ref == 'refs/heads/claude/clever-curie-i7onuy'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Afrilove World — latest Android build
          body: |
            Latest Android build of Afrilove World.
            - **app-release.apk** — install directly on a device (debug-signed, for testing).
            - **app-release.aab** — Google Play upload (needs an upload key to publish).
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
