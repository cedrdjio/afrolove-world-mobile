name: Build Android APK

# Builds a release APK in the cloud — no local setup required.
# Trigger manually from the GitHub "Actions" tab (Run workflow), or it runs
# automatically on push to the branches below.
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "claude/**"
    paths-ignore:
      - "**.md"

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show toolchain versions
        run: |
          flutter --version
          java -version

      - name: Install dependencies
        run: flutter pub get

      # Per-ABI APKs only for real phones (arm64-v8a + armeabi-v7a).
      # No universal APK, no x86_64 (emulators) -> much smaller downloads.
      - name: Build split APKs (arm64 + arm, minified)
        run: flutter build apk --release --split-per-abi --target-platform android-arm,android-arm64

      # App Bundle for the Play Store (Google ships per-device optimized APKs).
      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Report artifact sizes
        run: ls -lh build/app/outputs/flutter-apk/*.apk build/app/outputs/bundle/release/*.aab

      - name: Upload APK + AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: afrilove-world-apk
          if-no-files-found: error
          retention-days: 30
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/bundle/release/app-release.aab
