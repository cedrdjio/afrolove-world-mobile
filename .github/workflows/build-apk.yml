name: Build Android APK

# Builds a release APK in the cloud — no local setup required.
# Trigger manually from the GitHub "Actions" tab (Run workflow), or it runs
# automatically on push to the branches below.
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "claude/**"
    paths-ignore:
      - "**.md"

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show toolchain versions
        run: |
          flutter --version
          java -version

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK (universal)
        run: flutter build apk --release

      - name: Build split APKs (per ABI, smaller files)
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: afrilove-world-apk
          if-no-files-found: error
          retention-days: 30
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
