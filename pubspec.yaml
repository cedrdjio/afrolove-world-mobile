name: afrilove_world
description: "Afrilove World — premium international dating app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.3
  flutter_svg: ^2.0.9
  google_maps_flutter: ^2.7.0
  image_picker: ^1.0.7
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  provider: ^6.1.1
  intl_phone_field: ^3.2.0
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1
  fluttertoast: ^8.2.4
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  shared_preferences: ^2.2.2
  otp_text_field: ^1.1.3
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0
  flutter_localization: ^0.2.0
  lottie: ^3.1.0
  cloud_firestore: ^5.5.0
  firebase_messaging: ^15.2.3
  flutter_local_notifications: ^18.0.1
  intl: ^0.20.2
  permission_handler: ^11.2.0
  razorpay_flutter: ^1.4.0
  package_info_plus: ^8.1.1
  share_plus:
  flutter_widget_from_html_core:
  camera: ^0.11.0+2
  webview_flutter: ^4.7.0
  flutter_spinkit: ^5.2.0
  http_auth: ^1.0.4
  get: ^4.6.6
  onesignal_flutter: ^5.2.7
  emoji_picker_flutter: ^2.1.1
  google_mobile_ads: ^7.0.0
  googleapis_auth: ^1.4.1
  timeago:
  flutter_swipe_detector: ^2.0.0
  loading_animation_widget: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
    - assets/Image/
    - assets/lottie/
    - lang/
  fonts:
    - family: Satoshi-Regular
      fonts:
        - asset: assets/fonts/Satoshi-Regular.otf
    - family: Satoshi-Bold
      fonts:
        - asset: assets/fonts/Satoshi-Bold.otf
    - family: Satoshi-Medium
      fonts:
        - asset: assets/fonts/Satoshi-Medium.otf
    - family: Satoshi-Black
      fonts:
        - asset: assets/fonts/Satoshi-Black.otf
